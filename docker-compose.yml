version: '3.8'

services:
  api:
    build: .
    container_name: task-management-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-taskmanager}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_postgres_password}
      - MONGO_URI=mongodb://mongodb:27017/taskmanager
      - JWT_SECRET=${JWT_SECRET:-replace_with_a_long_random_secret_string}
      - JWT_EXPIRES_IN=7d
      - WEBHOOK_URL=http://api:5000/api/webhook/receive
    depends_on:
      - postgres
      - mongodb
    networks:
      - app-network

  postgres:
    image: postgres:15-alpine
    container_name: task-management-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-your_postgres_password}
      - POSTGRES_DB=${POSTGRES_DB:-taskmanager}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  mongodb:
    image: mongo:6-jammy
    container_name: task-management-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
